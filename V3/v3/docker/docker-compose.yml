services:
  # API REST + Agent
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    ports:
      - "8080:8080"
    volumes:
      - agent_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Scheduler pour scans automatiques
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "src.scheduler.jobs"]
    env_file: ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://agent:${DB_PASSWORD}@db:5432/phishing_agent
    volumes:
      - agent_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Base de donnees PostgreSQL
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: phishing_agent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d phishing_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  agent_data:
